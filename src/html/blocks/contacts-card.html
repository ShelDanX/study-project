<div class="contacts-card @@class">
  <div class="contacts-card__icon-wrap">
    <svg class="contacts-card__icon">
      <use xlink:href="@@icon"></use>
    </svg>
  </div>
  <div class="contacts-card__info">
    <h3 class="contacts-card__title">@@title</h3>
    <p class="contacts-card__text">@@first-line</p>
    <p class="contacts-card__text">@@second-line</p>
  </div>
</div>
